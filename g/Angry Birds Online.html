<!DOCTYPE html>
<html translate="no">
  <head>
  <base href="https://cdn.jsdelivr.net/gh/greeniYT/y@main/angrybirds-3.1/" target="_blank">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="shortcut icon" href="icon.png">
    <title>Angry Birds Online</title>
    <meta name="keywords" content="H5 Games, Angry Birds Online">
    <meta name="description" content="Play angry birds online">
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      html,
      body,
      #container {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }
      #loading {
        position: absolute;
        margin: auto;
        top: 0;
        bottom: 0;
        left: 10%;
        right: 10%;
        width: 80%;
        height: 40%;
        max-height: 80%;
        max-height: 80vw;
        box-sizing: border-box;
        text-align: center;
      }
      #loading img {
        display: block;
        margin: 0 auto;
        border-radius: 20%;
        max-width: 100%;
        height: 80%;
      }
      #loading p {
        margin-top: 10px;
        margin-top: 2vh;
        font-size: 16px;
        font-size: 8vh;
        font-size: min(6vh, 12vw);
        color: #fff;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="loading">

    
        <img src="icon.png">
        <p id="label">LOADING</p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
