<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="EaglercraftX 1.8 test directory HTML page" />
  <meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.8, 1.8.8" />
  <title>EaglyMC 1.20</title>

  <meta property="og:locale" content="en-US" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="EaglyMC 1.20" />
  <meta property="og:description" content="test directory HTML page" />

  <link type="image/png" rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/tharuniscool/elite-gamez.github.io@main/favicon.png" />

  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/tharuniscool/elite-gamez.github.io@main/classess.js"></script>

  <script type="text/javascript">
    "use strict";
    window.addEventListener("load", function () {
      var relayId = Math.floor(Math.random() * 3);
      window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "https://cdn.jsdelivr.net/gh/tharuniscool/elite-gamez.github.io@main/assets.epk",
        localesURI: "https://cdn.jsdelivr.net/gh/tharuniscool/elite-gamez.github.io@main/lang/",
        worldsDB: "worlds",
        logInvalidCerts: true,
        crashOnUncaughtExceptions: true,
        servers: [
          { addr: "ws://localhost:8081/", name: "Local test server" }
        ],
        relays: [
          { addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
          { addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
          { addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 },
          { addr: "wss://wisp.classroom.lat/", comment: "(CUSTOM) kryption replay #1", primary: relayId === 4 },
          { addr: "wss://wisp.mercurywork.shop/", comment: "(CUSTOM) sandstone relay #1", primary: relayId === 4 }
        ]
      };


      var q = window.location.search;
      if ((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
        q = new window.URLSearchParams(q);
        var s = q.get("server");
        if (s) window.eaglercraftXOpts.joinServer = s;
      }

      main();
    });
  </script>
</head>
<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
</body>
</html>
